<svg xmlns="http://www.w3.org/2000/svg" width="420" height="680" viewBox="0 0 420 680">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <linearGradient id="titleIcon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c7eff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Window shadow -->
  <rect x="22" y="22" width="380" height="640" rx="16" fill="#000" opacity="0.4" filter="url(#shadow)"/>

  <!-- Window background -->
  <rect x="20" y="20" width="380" height="640" rx="16" fill="url(#bgGrad)"/>

  <!-- Title Bar -->
  <g transform="translate(40, 46)">
    <text font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="22" fill="url(#titleIcon)">&#x1F6E1;</text>
    <text x="32" y="4" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="18" font-weight="700" fill="#cdd6f4">VPN Keep Awake</text>
    <!-- Close icon (settings open) -->
    <circle cx="320" cy="-2" r="12" fill="#45475a" opacity="0.5"/>
    <text x="314" y="3" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="14" fill="#cdd6f4">&#x2715;</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="68" x2="380" y2="68" stroke="#313244" stroke-width="1"/>

  <!-- Language Card -->
  <g transform="translate(40, 84)">
    <rect width="340" height="72" rx="12" fill="#313244" opacity="0.5"/>
    <rect width="340" height="72" rx="12" fill="#1e1e2e" opacity="0.3"/>

    <text x="16" y="28" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="13" font-weight="600" fill="#cdd6f4">Language</text>

    <!-- Segmented control -->
    <rect x="16" y="40" width="308" height="24" rx="6" fill="#45475a" opacity="0.5"/>
    <rect x="170" y="41" width="152" height="22" rx="5" fill="#585b70"/>
    <text x="92" y="56" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="12" fill="#6c7086" text-anchor="middle">Türkçe</text>
    <text x="246" y="56" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="12" font-weight="500" fill="#cdd6f4" text-anchor="middle">English</text>
  </g>

  <!-- Check Interval Card -->
  <g transform="translate(40, 172)">
    <rect width="340" height="72" rx="12" fill="#313244" opacity="0.5"/>
    <rect width="340" height="72" rx="12" fill="#1e1e2e" opacity="0.3"/>

    <text x="16" y="28" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="13" font-weight="600" fill="#cdd6f4">Check Interval</text>

    <!-- Segmented control -->
    <rect x="16" y="40" width="308" height="24" rx="6" fill="#45475a" opacity="0.5"/>
    <rect x="93" y="41" width="76" height="22" rx="5" fill="#585b70"/>
    <text x="54" y="56" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="12" fill="#6c7086" text-anchor="middle">5 sec</text>
    <text x="131" y="56" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="12" font-weight="500" fill="#cdd6f4" text-anchor="middle">10 sec</text>
    <text x="208" y="56" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="12" fill="#6c7086" text-anchor="middle">30 sec</text>
    <text x="285" y="56" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="12" fill="#6c7086" text-anchor="middle">60 sec</text>
  </g>

  <!-- Notifications Card -->
  <g transform="translate(40, 260)">
    <rect width="340" height="128" rx="12" fill="#313244" opacity="0.5"/>
    <rect width="340" height="128" rx="12" fill="#1e1e2e" opacity="0.3"/>

    <text x="16" y="28" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="13" font-weight="600" fill="#cdd6f4">Notifications</text>

    <!-- Show Notifications toggle -->
    <text x="16" y="54" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="13" fill="#cdd6f4">Show Notifications</text>
    <rect x="280" y="40" width="44" height="26" rx="13" fill="#4ade80"/>
    <circle cx="311" cy="53" r="10" fill="white"/>

    <!-- Sound Alert toggle -->
    <text x="16" y="82" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="13" fill="#cdd6f4">Sound Alert</text>
    <rect x="280" y="68" width="44" height="26" rx="13" fill="#4ade80"/>
    <circle cx="311" cy="81" r="10" fill="white"/>

    <!-- Menu Bar Uptime toggle -->
    <text x="16" y="110" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="13" fill="#cdd6f4">Show Uptime in Menu Bar</text>
    <rect x="280" y="96" width="44" height="26" rx="13" fill="#4ade80"/>
    <circle cx="311" cy="109" r="10" fill="white"/>
  </g>

  <!-- Launch at Login Card -->
  <g transform="translate(40, 404)">
    <rect width="340" height="72" rx="12" fill="#313244" opacity="0.5"/>
    <rect width="340" height="72" rx="12" fill="#1e1e2e" opacity="0.3"/>

    <text x="16" y="28" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="13" font-weight="600" fill="#cdd6f4">Launch at Login</text>
    <!-- Toggle OFF -->
    <rect x="280" y="14" width="44" height="26" rx="13" fill="#45475a"/>
    <circle cx="293" cy="27" r="10" fill="#9399b2"/>

    <text x="16" y="52" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="11" fill="#6c7086">Automatically start when you log in (macOS 13+)</text>
  </g>

  <!-- Log File Card -->
  <g transform="translate(40, 492)">
    <rect width="340" height="80" rx="12" fill="#313244" opacity="0.5"/>
    <rect width="340" height="80" rx="12" fill="#1e1e2e" opacity="0.3"/>

    <text x="16" y="28" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="13" font-weight="600" fill="#cdd6f4">Log File</text>

    <text x="16" y="48" font-family="SF Mono, Menlo, monospace" font-size="9.5" fill="#6c7086">~/Library/Application Support/</text>
    <text x="16" y="60" font-family="SF Mono, Menlo, monospace" font-size="9.5" fill="#6c7086">VPNKeepAwake/vpn_log.txt</text>

    <text x="16" y="76" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="12" fill="#89b4fa">&#x1F4C2; Open in Finder</text>
  </g>

  <!-- Footer -->
  <line x1="40" y1="594" x2="380" y2="594" stroke="#313244" stroke-width="1"/>
  <g transform="translate(40, 610)">
    <circle cx="8" cy="8" r="6" fill="none" stroke="#45475a" stroke-width="2"/>
    <path d="M 8 2 A 6 6 0 0 1 14 8" fill="none" stroke="#6c7eff" stroke-width="2" stroke-linecap="round"/>
    <text x="22" y="12" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="11" fill="#6c7086">Next check in 4s</text>
    <text x="290" y="12" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="12" font-weight="500" fill="#f38ba8">&#x23FB; Quit</text>
  </g>

  <!-- Window border -->
  <rect x="20" y="20" width="380" height="640" rx="16" fill="none" stroke="#45475a" stroke-width="0.5"/>
</svg>